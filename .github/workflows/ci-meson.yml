name: Meson CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SPDK_ROOT: /opt/spdk
  VCPKG_ROOT: /opt/vcpkg
  VCPKG_INSTALLED: /opt/vcpkg_installed/x64-linux

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build build-essential libaio-dev python3-pyelftools libfuse3-dev libkeyutils-dev libnuma-dev

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v5.0.5
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            /opt/vcpkg_installed
          key: vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          sudo git clone https://github.com/microsoft/vcpkg $VCPKG_ROOT
          sudo $VCPKG_ROOT/bootstrap-vcpkg.sh
          $VCPKG_ROOT/vcpkg install --triplet=x64-linux --x-manifest-root=. --x-install-root=/opt/vcpkg_installed

      - name: Cache SPDK
        id: cache-spdk
        uses: actions/cache@v5.0.5
        with:
          path: ${{ env.SPDK_ROOT }}
          key: spdk-v24.09

      - name: Setup SPDK
        if: steps.cache-spdk.outputs.cache-hit != 'true'
        run: |
          sudo git clone --depth 1 --branch v24.09 https://github.com/spdk/spdk $SPDK_ROOT
          cd $SPDK_ROOT
          sudo git submodule update --init --depth 1
          sudo ./scripts/pkgdep.sh
          ./configure --enable-asan
          make -j$(nproc)

      - name: Configure build.ini
        run: |
          cat > build.ini <<'EOF'
          [constants]
          spdk_root = '/opt/spdk'
          vcpkg_root_abs = '/opt/vcpkg_installed/x64-linux'

          [built-in options]
          buildtype = 'release'
          pkg_config_path = [
              vcpkg_root_abs + '/lib/pkgconfig',
              vcpkg_root_abs + '/share/pkgconfig',
              spdk_root + '/build/lib/pkgconfig']
          cmake_prefix_path = [vcpkg_root_abs + '/share']

          [properties]
          spdk_include = spdk_root + '/include'
          spdk_build_include = spdk_root + '/build/include'
          spdk_build_lib = spdk_root + '/build/lib'
          dpdk_build_lib = spdk_root + '/dpdk/build/lib'
          vcpkg_include = vcpkg_root_abs + '/include'
          EOF

      - name: Setup Meson build
        run: meson setup builddir --native-file build.ini --wipe

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs
